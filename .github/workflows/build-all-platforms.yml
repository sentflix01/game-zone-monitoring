name: Build & Release All Platforms

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
  VITE_ADMIN_UIDS: ${{ secrets.VITE_ADMIN_UIDS }}

jobs:
  # ── Lint, typecheck, unit + Playwright (gates platform builds) ─────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - name: Build web assets (creates dist/)
        run: npm run build
      - name: Sync Capacitor Android assets (generates capacitor.plugins.json)
        run: npx cap sync android
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true

  # ── Web PWA ────────────────────────────────────────────────────────────────
  build-web:
    name: Web PWA
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-pwa
          path: dist/
          retention-days: 30

  # ── Android APK ────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: npm install --legacy-peer-deps
      # Build web assets with base '/' for Capacitor
      - run: npm run build
      # Sync fresh dist/ into android assets (overwrites any stale files)
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Windows .exe ───────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    needs: [quality]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      # Build with './' base for Electron file:// protocol
      - run: npm run build:electron
      - name: Package Electron app (no publish)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          retention-days: 30

  # ── macOS DMG ──────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    needs: [quality]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --legacy-peer-deps
      # Build with './' base for Electron file:// protocol
      - run: npm run build:electron
      - name: Package Electron app (no publish)
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          retention-days: 30

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-web, build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Game Zone v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## Game Zone — PS4/PS5 Monitoring App

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🌐 Web PWA | Hosted — install from browser |
            | 🤖 Android | `app-debug.apk` |
            | 🪟 Windows | `Game Zone Setup.exe` |
            | 🍎 macOS | `Game Zone.dmg` |

            ### Install on Android
            1. Download `app-debug.apk`
            2. Settings → Security → enable **Install unknown apps**
            3. Open the APK to install

            ### Install on Windows
            Run `Game Zone Setup.exe` — click Install when prompted.

            ### Install on macOS
            Open `Game Zone.dmg`, drag to Applications.
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/android-debug-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
