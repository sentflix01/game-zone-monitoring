# Runs the same quality checks as the first job in `build-all-platforms.yml` so
# pull requests are validated before merge without building every platform.
name: Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
  VITE_ADMIN_UIDS: ${{ secrets.VITE_ADMIN_UIDS }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (creates dist/)
        run: npm run build

      - name: Sync Capacitor Android assets (generates capacitor.plugins.json)
        run: npx cap sync android

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
        env:
          CI: true
