    <div id="root"></div>
    <script>
      // Capture install prompt as early as possible
      window.__installPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.__installPrompt = e;
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
